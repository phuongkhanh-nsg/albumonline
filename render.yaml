services:
  - type: web
    name: albumonline
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: albumonline-db
          property: connectionString

databases:
  - name: albumonline-db
    plan: free
