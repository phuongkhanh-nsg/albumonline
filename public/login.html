<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - AlbumOnline</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand" style="font-size:1.2rem;gap:6px;">
      <span style="font-size:1.3em;">📸</span> <span>ALBUM NSG</span>
    </a>
    <button class="navbar-toggle" aria-label="Mở menu" onclick="toggleNavbarMenu()">☰</button>
    <div class="navbar-overlay" id="navbarOverlay" onclick="closeNavbarMenu()"></div>
    <div class="navbar-links" id="navbarLinks">
      <a href="/">Trang chủ</a>
      <a href="/create">Tạo Album</a>
      <a href="/manage">Quản lý</a>
      <a href="/admin-users" id="adminMenuLink" style="display:none">Quản lý thành viên</a>
      <a href="/admin-settings" id="adminSettingsLink" style="display:none">Cấu hình</a>
    </div>
  </nav>
  <script>
    window.toggleNavbarMenu = function() {
      const links = document.getElementById('navbarLinks');
      const overlay = document.getElementById('navbarOverlay');
      links.classList.toggle('show');
      overlay.classList.toggle('show');
      if (links.classList.contains('show')) {
        links.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', closeNavbarMenu);
        });
      }
    }
    window.closeNavbarMenu = function() {
      document.getElementById('navbarLinks').classList.remove('show');
      document.getElementById('navbarOverlay').classList.remove('show');
    }
  </script>

  <div class="container" style="padding-top: 4rem; padding-bottom: 3rem;">
    <div class="section-title">
      <h2>🔑 Đăng nhập</h2>
      <p>Đăng nhập để quản lý album của bạn</p>
    </div>

    <div class="card auth-card">
      <form id="loginForm">
        <div class="form-group">
          <label>👤 Tên đăng nhập hoặc Email</label>
          <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập hoặc email..." required autocomplete="username">
        </div>

        <div class="form-group">
          <label>🔒 Mật khẩu</label>
          <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
        </div>

        <div style="text-align: right; margin-bottom: 1rem;">
          <a href="/forgot-password" style="font-size: 0.9rem; color: var(--text-muted);">🔑 Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
          🚀 Đăng nhập
        </button>
      </form>



      <div class="auth-footer">
        <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 AlbumOnline - Chia sẻ Album ảnh từ Google Drive - Tùy chỉnh bởi Rồng Con HG</p>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    // Handle Google OAuth callback
    const params = new URLSearchParams(window.location.search);
    if (params.get('google_token')) {
      setToken(params.get('google_token'));
      setUser(JSON.parse(params.get('google_user')));
      showToast('Đăng nhập Google thành công!', 'success');
      setTimeout(() => window.location.href = '/manage', 500);
    } else if (params.get('error')) {
      const errMap = {
        google_not_configured: 'Chức năng đăng nhập Google chưa được cấu hình. Vui lòng liên hệ quản trị viên.',
        oauth_failed: 'Đăng nhập Google thất bại. Vui lòng thử lại.',
        no_code: 'Đăng nhập Google thất bại. Không nhận được mã xác thực.',
      };
      showToast(errMap[params.get('error')] || 'Đăng nhập thất bại.', 'error');
    }

    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = '/manage';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Đang đăng nhập...';

      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        setToken(data.token);
        setUser(data.user);
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => window.location.href = '/manage', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = '🚀 Đăng nhập';
      }
    });
  </script>
</body>
</html>
