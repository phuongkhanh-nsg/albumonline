<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - AlbumOnline</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand" style="font-size:1.2rem;gap:6px;">
      <span style="font-size:1.3em;">📸</span> <span>ALBUM NSG</span>
    </a>
    <button class="navbar-toggle" aria-label="Mở menu" onclick="toggleNavbarMenu()">☰</button>
    <div class="navbar-overlay" id="navbarOverlay" onclick="closeNavbarMenu()"></div>
    <div class="navbar-links" id="navbarLinks">
      <a href="/">Trang chủ</a>
      <a href="/create">Tạo Album</a>
      <a href="/manage">Quản lý</a>
      <a href="/admin-users" id="adminMenuLink" style="display:none">Quản lý thành viên</a>
      <a href="/admin-settings" id="adminSettingsLink" style="display:none">Cấu hình</a>
    </div>
  </nav>

  <div class="container" style="padding-top: 4rem; padding-bottom: 3rem;">
    <div class="section-title">
      <h2>🔑 Đăng nhập</h2>
      <p>Đăng nhập để quản lý album của bạn</p>
    </div>

    <div class="card auth-card" style="max-width: 480px; margin: 0 auto;">
      <form id="loginForm">
        <div class="form-group">
          <label>👤 Tên đăng nhập hoặc Email</label>
          <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập hoặc email..." required autocomplete="username">
        </div>

        <div class="form-group">
          <label>🔒 Mật khẩu</label>
          <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
        </div>

        <div style="text-align: right; margin-bottom: 1rem;">
          <a href="/forgot-password" style="font-size: 0.9rem; color: var(--text-muted);">🔑 Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
          🚀 Đăng nhập
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="color:var(--text-muted);font-size:0.85rem;">hoặc</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <a href="/api/auth/google" id="googleLoginBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.95rem;font-weight:600;text-decoration:none;transition:all 0.2s;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Đăng nhập bằng Google
      </a>

      <div class="auth-footer">
        <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 Album NSG - Chia sẻ Album ảnh từ Google Drive - <a href="https://rongcon.net" target="_blank">Tùy chỉnh bởi Rồng Con HG</a></p>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    // Handle Google OAuth callback
    const params = new URLSearchParams(window.location.search);
    if (params.get('google_token')) {
      setToken(params.get('google_token'));
      setUser(JSON.parse(params.get('google_user')));
      showToast('Đăng nhập Google thành công!', 'success');
      setTimeout(() => window.location.href = '/manage', 500);
    } else if (params.get('error')) {
      const errMap = {
        google_not_configured: 'Chức năng đăng nhập Google chưa được cấu hình. Vui lòng liên hệ quản trị viên.',
        oauth_failed: 'Đăng nhập Google thất bại. Vui lòng thử lại.',
        no_code: 'Đăng nhập Google thất bại. Không nhận được mã xác thực.',
      };
      showToast(errMap[params.get('error')] || 'Đăng nhập thất bại.', 'error');
    }

    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = '/manage';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Đang đăng nhập...';

      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        setToken(data.token);
        setUser(data.user);
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => window.location.href = '/manage', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = '🚀 Đăng nhập';
      }
    });
  </script>
</body>
</html>
